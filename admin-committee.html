<!DOCTYPE html>
<html>
<head>
<title>Admin - Committee Members</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0c0474;
}
.card{
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container mt-5">
<div class="card p-4">

<h3 class="text-center" style="color:#8C2138;">Admin Panel - Add Committee Member</h3>

<div class="mb-3">
<label>Name</label>
<input type="text" id="name" class="form-control">
</div>

<div class="mb-3">
<label>Role (Chairman, Secretary, etc.)</label>
<input type="text" id="role" class="form-control">
</div>

<div class="mb-3">
<label>College / Place</label>
<input type="text" id="place" class="form-control">
</div>

<div class="mb-3">
<label>Term (ex: 2025-2026)</label>
<input type="text" id="term" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" id="phone" class="form-control">
</div>

<div class="mb-3">
<label>Upload Photo</label>
<input type="file" id="photo" class="form-control">
</div>

<button class="btn btn-success w-100" onclick="addMember()">Add Member</button>

</div>
</div>

<script>
function addMember(){
let name=document.getElementById("name").value;
let role=document.getElementById("role").value;
let place=document.getElementById("place").value;
let term=document.getElementById("term").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let file=document.getElementById("photo").files[0];

if(!name || !role || !place || !file){
    alert("Please fill required fields");
    return;
}

let reader = new FileReader();
reader.onload = function(e){

let member = {
name:name,
role:role,
place:place,
term:term,
email:email,
phone:phone,
photo:e.target.result
};

let members = JSON.parse(localStorage.getItem("committeeMembers")) || [];
members.push(member);
localStorage.setItem("committeeMembers", JSON.stringify(members));

alert("Member Added Successfully!");

document.querySelectorAll("input").forEach(i=>i.value="");
}
reader.readAsDataURL(file);
}
</script>

</body>
</html>
